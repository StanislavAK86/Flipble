version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flipble_postgres
    restart: always
    environment:
      POSTGRES_DB: flipble_db
      POSTGRES_USER: flipble_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flipble_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipble_user -d flipble_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flipble_backend
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: flipble_db
      DB_USER: flipble_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEBUG: 'False'
      ALLOWED_HOSTS: 'flipble.it-atp.ru,localhost,127.0.0.1'
      CSRF_TRUSTED_ORIGINS: 'https://flipble.it-atp.ru,http://flipble.it-atp.ru'
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flipble_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: flipble_frontend
    restart: always
    environment:
      VITE_API_URL: /api
    networks:
      - flipble_network

  nginx:
    image: nginx:alpine
    container_name: flipble_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - flipble_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  flipble_network:
    driver: bridge